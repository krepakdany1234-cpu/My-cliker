<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ЗАДНИЙ ФОН --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            user-select: none;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: overlay;
        }

        /* --- СЧЕТЧИК (Деревянная табличка) --- */
        .guild-board {
            background-color: #5c3a21;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.05) 0px, rgba(0, 0, 0, 0.05) 2px, transparent 2px, transparent 12px),
                linear-gradient(to bottom, #6a4022, #3e2412);
            border: 4px solid #2a160a;
            border-radius: 8px;
            padding: 15px 25px;
            margin-bottom: 30px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            position: relative;
            text-align: center;
            width: 240px;
        }

        .guild-board::before, .guild-board::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 8px;
            height: 8px;
            background-color: #120a05;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #555, 0 1px 1px rgba(255,255,255,0.2);
        }
        .guild-board::before { left: 10px; }
        .guild-board::after { right: 10px; }

        .greeting {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .score-container {
            color: #fff8e7;
            font-size: 3.2rem;
            font-weight: bold;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.9);
            margin-bottom: 15px;
        }

        /* --- ПОЛОСКА ЭНЕРГИИ --- */
        .energy-wrapper {
            width: 100%;
            background-color: #1a0f07;
            border: 2px solid #000;
            border-radius: 10px;
            height: 14px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }

        .energy-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4caf50, #1b5e20); 
            transition: width 0.3s ease-out;
        }

        .energy-text {
            color: #a5d6a7;
            font-size: 0.85rem;
            margin-top: 8px;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 2px #000;
        }

        /* --- ОБЩАЯ ОБЕРТКА (Для правильных теней всей конструкции) --- */
        .ore-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Глубокая тень от камней + зеленое свечение от руды */
            filter: drop-shadow(0 20px 15px rgba(0, 0, 0, 0.7)) drop-shadow(0 0 25px rgba(76, 175, 80, 0.4));
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            margin-top: 10px;
        }

        /* --- РЕАЛИСТИЧНЫЙ 3D КРИСТАЛЛ --- */
        .mithril-ore {
            width: 140px;
            height: 270px; /* Сделал чуть выше, как на эскизе */
            /* Точная форма ограненного кристалла */
            clip-path: polygon(50% 0%, 95% 25%, 85% 85%, 50% 100%, 15% 85%, 5% 25%);
            
            /* Сложная система градиентов для создания объемных 3D-граней */
            background: 
                /* 1. Светящееся ядро в центре */
                radial-gradient(circle at 50% 65%, #69f0ae 0%, #00c853 25%, transparent 60%),
                
                /* 2. Верхняя левая грань (освещенная) */
                linear-gradient(155deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 32%, transparent 32.5%),
                
                /* 3. Верхняя правая грань (в тени) */
                linear-gradient(-155deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 32%, transparent 32.5%),
                
                /* 4. Левая вертикальная грань (глубокая тень) */
                linear-gradient(95deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 25%, transparent 25.5%),
                
                /* 5. Правая вертикальная грань (блик) */
                linear-gradient(-95deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 25%, transparent 25.5%),
                
                /* Основной глубокий изумрудный цвет (база) */
                #0f5132;
                
            position: relative;
            z-index: 2; /* Кристалл поверх камней */
        }

        /* Центральная ромбовидная грань с легким бликом */
        .mithril-ore::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            clip-path: polygon(50% 25%, 75% 55%, 50% 85%, 25% 55%);
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 80%);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* --- ГРУДА КАМНЕЙ (ОСНОВАНИЕ) --- */
        .rock-base {
            position: absolute;
            bottom: -15px;
            width: 140px;
            height: 50px;
            z-index: 1; /* Под кристаллом */
            
            /* Главный центральный камень */
            background: radial-gradient(circle at 40% 30%, #757575 0%, #424242 60%, #212121 100%);
            border-radius: 40% 60% 50% 50% / 50% 50% 60% 50%;
            box-shadow: 
                inset -5px -10px 15px rgba(0,0,0,0.8), /* Объем камня */
                0 -10px 15px rgba(76, 175, 80, 0.4); /* Зеленый отсвет от кристалла на камень */
        }

        /* Боковые камни, создающие кластер (груду) */
        .rock-base::before, .rock-base::after {
            content: '';
            position: absolute;
            background: radial-gradient(circle at 40% 20%, #8a8a8a 0%, #4f4f4f 60%, #1a1a1a 100%);
            box-shadow: inset -3px -5px 10px rgba(0,0,0,0.8);
        }

        /* Левый малый камень */
        .rock-base::before {
            width: 65px;
            height: 40px;
            left: -25px;
            bottom: 5px;
            border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%;
            transform: rotate(-20deg);
        }

        /* Правый средний камень (чуть темнее) */
        .rock-base::after {
            width: 80px;
            height: 45px;
            right: -30px;
            bottom: -5px;
            border-radius: 30% 70% 50% 50% / 40% 50% 60% 50%;
            transform: rotate(15deg);
            background: radial-gradient(circle at 30% 30%, #6d6d6d 0%, #3b3b3b 60%, #111111 100%);
        }

        /* --- АНИМАЦИЯ НАЖАТИЯ --- */
        .ore-wrapper:active {
            /* Конструкция сжимается и проседает к земле */
            transform: scale(0.96) translateY(6px);
            /* Тень становится гуще и короче */
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 45px rgba(76, 175, 80, 0.7));
        }

        /* Летающие циферки */
        .floating-text {
            position: absolute;
            color: #69f0ae;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #00e676, 1px 1px 2px #000;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="guild-board">
        <div class="greeting" id="greeting">Авантюрист</div>
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">Загрузка...</div>
    </div>

    <div class="ore-wrapper" id="ore">
        <div class="mithril-ore"></div>
        <div class="rock-base"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const scoreElement = document.getElementById('score');
        const oreElement = document.getElementById('ore');
        const greetingElement = document.getElementById('greeting');
        const energyBar = document.getElementById('energy-bar');
        const energyTextElement = document.getElementById('energy-text');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingElement.innerText = tg.initDataUnsafe.user.first_name;
        }

        const maxEnergy = 500;
        const regenAmount = 100;
        const regenIntervalMs = 5 * 60 * 1000;

        let score = parseInt(localStorage.getItem('mithrilScore')) || 0;
        let energy = parseInt(localStorage.getItem('mithrilEnergy'));
        if (isNaN(energy)) energy = maxEnergy;

        let lastTickTime = parseInt(localStorage.getItem('lastTickTime')) || Date.now();

        function checkEnergyRegen() {
            let now = Date.now();
            if (energy < maxEnergy) {
                let timePassed = now - lastTickTime;
                
                if (timePassed >= regenIntervalMs) {
                    let ticks = Math.floor(timePassed / regenIntervalMs);
                    energy += ticks * regenAmount;
                    if (energy > maxEnergy) energy = maxEnergy;
                    
                    lastTickTime += ticks * regenIntervalMs; 
                    saveData();
                }
            } else {
                lastTickTime = now;
            }
        }

        function updateUI() {
            scoreElement.innerText = score;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;

            if (energy >= maxEnergy) {
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (Максимум)`;
            } else {
                let now = Date.now();
                let timeLeftMs = regenIntervalMs - (now - lastTickTime);
                if (timeLeftMs < 0) timeLeftMs = 0;
                
                let minutes = Math.floor(timeLeftMs / 60000);
                let seconds = Math.floor((timeLeftMs % 60000) / 1000);
                let timeString = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${timeString})`;
            }
        }

        function saveData() {
            localStorage.setItem('mithrilScore', score);
            localStorage.setItem('mithrilEnergy', energy);
            localStorage.setItem('lastTickTime', lastTickTime);
        }

        checkEnergyRegen();
        updateUI();
        
        setInterval(() => {
            checkEnergyRegen();
            updateUI();
        }, 1000);

        oreElement.addEventListener('pointerdown', (e) => {
            if (energy >= 1) {
                if (energy === maxEnergy) {
                    lastTickTime = Date.now();
                }

                energy--;
                score++;
                
                saveData();
                updateUI();

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-text');
                plusOne.innerText = '+1';
                
                plusOne.style.left = `${e.clientX - 15}px`;
                plusOne.style.top = `${e.clientY - 40}px`;
                
                document.body.appendChild(plusOne);

                setTimeout(() => {
                    plusOne.remove();
                }, 1000);
            } else {
                energyTextElement.style.color = '#ff5252';
                setTimeout(() => energyTextElement.style.color = '#a5d6a7', 300);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });
    </script>
</body>
</html>
