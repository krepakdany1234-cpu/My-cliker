<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ТОТАЛЬНАЯ ЗАЩИТА ВСЕХ ЭЛЕМЕНТОВ --- */
        * {
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            -khtml-user-select: none;    
            -moz-user-select: none;      
            -ms-user-select: none;       
            user-select: none;           
            -webkit-user-drag: none;     
            box-sizing: border-box;
        }

        /* --- ЗАДНИЙ ФОН (Город) --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.6);
            background-blend-mode: overlay;
            overflow: hidden; 
        }

        /* --- ТАБЛИЧКА --- */
        .guild-board {
            background: none;
            border: none;
            box-shadow: none;
            background-image: url('1000019094-removebg-preview.png');
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            width: 390px; 
            padding-top: 90px;    
            padding-bottom: 80px; 
            padding-left: 40px;   
            padding-right: 40px;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));
            margin-bottom: 20px; 
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Счет */
        .score-container {
            color: #1a0b02; 
            font-size: 3.4rem; 
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.25), -1px -1px 2px rgba(0, 0, 0, 0.9);
            margin-bottom: 12px;
            z-index: 2;
        }

        /* --- ПОЛОСКА ЭНЕРГИИ --- */
        .energy-wrapper {
            width: 65%; 
            background-color: rgba(10, 5, 0, 0.5); 
            border: 1px solid rgba(0,0,0,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            height: 12px; 
            overflow: hidden;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.9); 
            z-index: 2;
        }

        .energy-bar {
            height: 100%; 
            width: 100%;
            background: linear-gradient(90deg, #2e7d32, #50b487, #81c784); 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5); 
            transition: width 0.3s ease-out;
        }

        .energy-text {
            color: #ffeba1; 
            font-size: 0.85rem; 
            margin-top: 8px;
            font-weight: bold;
            letter-spacing: 0.5px; 
            white-space: nowrap; 
            text-shadow: 1px 1px 3px #000, -1px -1px 1px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* --- КАРТИНКА РУДЫ --- */
        .ore-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .crystal-img {
            width: 280px; 
            height: auto;
            filter: drop-shadow(0 25px 15px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 30px rgba(100, 255, 150, 0.4));
            transition: transform 0.1s ease, filter 0.1s ease;
            cursor: pointer; 
        }

        .crystal-img:active {
            transform: scale(0.95) translateY(5px);
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 45px rgba(100, 255, 150, 0.8));
        }

        /* --- ЛЕТАЮЩИЕ ЦИФРЫ --- */
        .floating-text {
            position: absolute;
            color: #a5d6a7;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #50b487, 1px 1px 2px #000;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }

        /* --- АНИМАЦИЯ РЕАЛИСТИЧНОЙ КИРКИ --- */
        .pickaxe-effect {
            position: absolute;
            width: 100px; 
            height: auto;
            pointer-events: none;
            z-index: 50;
            transform-origin: bottom right; 
            animation: mineStrike ease-in-out forwards;
            filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.7));
        }

        @keyframes mineStrike {
            0% { transform: rotate(-30deg) scale(1.1); opacity: 0; }
            30% { transform: rotate(-70deg) scale(1.2); opacity: 1; } 
            60% { transform: rotate(15deg) scale(1.1); opacity: 1; }  
            100% { transform: rotate(25deg) scale(0.9); opacity: 0; } 
        }

        /* --- ИСКРЫ --- */
        .spark {
            position: absolute;
            width: 8px; 
            height: 8px;
            background-color: #ffffff; 
            border-radius: 50%;
            pointer-events: none;
            z-index: 45;
            box-shadow: 0 0 8px #fff, 0 0 15px #ffd700, 0 0 25px #ff8c00;
            animation: sparkFly 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }

        @keyframes sparkFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { opacity: 1; } 
            100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
        }

        /* =========================================
           МАГАЗИН (ФЭНТЕЗИ СТИЛЬ)
           ========================================= */
        
        .open-shop-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: linear-gradient(to bottom, #8b5a2b, #4e342e);
            border: 2px solid #2a1610;
            color: #ffeba1;
            padding: 12px 25px;
            font-family: 'Georgia', serif;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,255,255,0.2);
            cursor: pointer;
            text-shadow: 1px 1px 2px #000;
            z-index: 20;
            transition: transform 0.1s;
        }
        .open-shop-btn:active { transform: scale(0.95); }

        .shop-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(3px); 
        }

        .shop-modal {
            background: linear-gradient(to bottom, #5c3a21, #3e2723);
            border: 4px solid #1a0b02;
            border-radius: 15px;
            width: 90%; 
            max-width: 400px;
            padding: 20px;
            color: #ffeba1;
            box-shadow: 0 10px 30px rgba(0,0,0,1), inset 0 0 20px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
        }

        .close-shop-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.8rem; 
            color: #ff5252; 
            cursor: pointer; 
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .shop-title {
            font-size: 1.8rem; 
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000; 
            border-bottom: 2px solid #8b5a2b; 
            padding-bottom: 10px;
            color: #ffd700;
        }

        .shop-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 15px;
            border: 1px solid #8b5a2b; 
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .shop-item-info h3 { 
            margin: 0 0 5px 0; 
            font-size: 1.1rem; 
            color: #ffd700; 
            text-shadow: 1px 1px 2px #000;
        }
        
        .shop-item-info p { 
            margin: 0; 
            font-size: 0.85rem; 
            color: #a5d6a7; 
            text-shadow: 1px 1px 1px #000;
        }

        .shop-buy-btn {
            background: linear-gradient(to bottom, #2e7d32, #1b5e20);
            border: 1px solid #000; 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 8px;
            font-weight: bold; 
            font-family: 'Georgia', serif;
            cursor: pointer; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.3);
            text-shadow: 1px 1px 1px #000;
            min-width: 80px;
        }

        .shop-buy-btn:active { transform: scale(0.95); }
        
        .shop-buy-btn:disabled { 
            background: linear-gradient(to bottom, #555, #333); 
            color: #888; 
            cursor: not-allowed; 
            box-shadow: none;
        }

    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <div class="guild-board">
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">Загрузка...</div>
    </div>

    <div class="ore-wrapper">
        <img src="1000019091-removebg-preview.png" alt="Кристалл" class="crystal-img" id="ore-img" draggable="false">
    </div>

    <button class="open-shop-btn" id="open-shop">🛒 Лавка</button>

    <div class="shop-overlay" id="shop-modal">
        <div class="shop-modal">
            <div class="close-shop-btn" id="close-shop">✖</div>
            <h2 class="shop-title">Торговая Лавка</h2>

            <div class="shop-item">
                <div class="shop-item-info">
                    <h3>⚒️ Острая кирка</h3>
                    <p>Добыча за клик: +1</p>
                    <p style="color: #ffb74d; font-size: 0.8rem; margin-top: 3px;">Текущий уровень: <span id="lvl-pickaxe">1</span></p>
                </div>
                <button class="shop-buy-btn" id="buy-pickaxe">2500 💎</button>
            </div>

            <div class="shop-item">
                <div class="shop-item-info">
                    <h3>🎒 Гномья сумка</h3>
                    <p>Макс. энергия: +50</p>
                    <p style="color: #ffb74d; font-size: 0.8rem; margin-top: 3px;">Текущий запас: <span id="lvl-energy">500</span></p>
                </div>
                <button class="shop-buy-btn" id="buy-energy">100 💎</button>
            </div>

        </div>
    </div>

    <script>
        // --- ЗАЩИТА КОДА ---
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('selectstart', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault());

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || 
               (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });

        // --- БЕЗОПАСНАЯ ИНИЦИАЛИЗАЦИЯ TELEGRAM ---
        // (теперь не зависает, если открыть просто в браузере)
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
            }
        } catch (e) {
            console.log("Телеграм не найден, работаем в режиме браузера");
        }

        const scoreElement = document.getElementById('score');
        const oreImgElement = document.getElementById('ore-img');
        const energyBar = document.getElementById('energy-bar');
        const energyTextElement = document.getElementById('energy-text');

        const shopOverlay = document.getElementById('shop-modal');
        const btnOpenShop = document.getElementById('open-shop');
        const btnCloseShop = document.getElementById('close-shop');
        
        const btnBuyPickaxe = document.getElementById('buy-pickaxe');
        const btnBuyEnergy = document.getElementById('buy-energy');
        const lblLvlPickaxe = document.getElementById('lvl-pickaxe');
        const lblLvlEnergy = document.getElementById('lvl-energy');

        // Вспомогательная функция, чтобы безопасно доставать цифры из памяти
        function getSavedInt(key, defaultValue) {
            const val = parseInt(localStorage.getItem(key));
            return isNaN(val) ? defaultValue : val;
        }

        // ЗАГРУЗКА ДАННЫХ ИЗ ПАМЯТИ
        let score = getSavedInt('mithrilScore', 0);
        let clickPower = getSavedInt('mithrilClickPower', 1);
        let maxEnergy = getSavedInt('mithrilMaxEnergy', 500);
        
        // Устанавливаем цену кирки на 2500
        let costPickaxe = getSavedInt('mithrilCostPickaxe', 2500);
        if (clickPower === 1 && costPickaxe < 2500) {
            costPickaxe = 2500; // Лечит старые сохранения, если цена была меньше
        }
        
        let costEnergy = getSavedInt('mithrilCostEnergy', 100);
        let energy = getSavedInt('mithrilEnergy', maxEnergy);

        const regenAmount = 100;
        const regenIntervalMs = 5 * 60 * 1000;
        let lastTickTime = getSavedInt('lastTickTime', Date.now());
        let lastClickAnimTime = 0;

        function checkEnergyRegen() {
            let now = Date.now();
            if (energy < maxEnergy) {
                let timePassed = now - lastTickTime;
                
                if (timePassed >= regenIntervalMs) {
                    let ticks = Math.floor(timePassed / regenIntervalMs);
                    energy += ticks * regenAmount;
                    if (energy > maxEnergy) energy = maxEnergy;
                    
                    lastTickTime += ticks * regenIntervalMs; 
                    saveData();
                }
            } else {
                lastTickTime = now;
            }
        }

        function updateUI() {
            scoreElement.innerText = score;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;

            if (energy >= maxEnergy) {
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (Максимум)`;
            } else {
                let now = Date.now();
                let timeLeftMs = regenIntervalMs - (now - lastTickTime);
                if (timeLeftMs < 0) timeLeftMs = 0;
                
                let minutes = Math.floor(timeLeftMs / 60000);
                let seconds = Math.floor((timeLeftMs % 60000) / 1000);
                let timeString = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${timeString})`;
            }

            lblLvlPickaxe.innerText = clickPower;
            lblLvlEnergy.innerText = maxEnergy;
            
            btnBuyPickaxe.innerText = `${costPickaxe} 💎`;
            btnBuyEnergy.innerText = `${costEnergy} 💎`;

            btnBuyPickaxe.disabled = score < costPickaxe;
            btnBuyEnergy.disabled = score < costEnergy;
        }

        function saveData() {
            localStorage.setItem('mithrilScore', score);
            localStorage.setItem('mithrilEnergy', energy);
            localStorage.setItem('lastTickTime', lastTickTime);
            localStorage.setItem('mithrilClickPower', clickPower);
            localStorage.setItem('mithrilMaxEnergy', maxEnergy);
            localStorage.setItem('mithrilCostPickaxe', costPickaxe);
            localStorage.setItem('mithrilCostEnergy', costEnergy);
        }

        checkEnergyRegen();
        updateUI(); // Эта строчка стирает "Загрузка..."
        
        setInterval(() => {
            checkEnergyRegen();
            updateUI();
        }, 1000);

        btnOpenShop.addEventListener('pointerdown', () => {
            shopOverlay.style.display = 'flex';
            updateUI(); 
        });

        btnCloseShop.addEventListener('pointerdown', () => {
            shopOverlay.style.display = 'none';
        });

        btnBuyPickaxe.addEventListener('pointerdown', () => {
            if (score >= costPickaxe) {
                score -= costPickaxe;
                clickPower += 1;
                costPickaxe = Math.floor(costPickaxe * 1.5); 
                saveData();
                updateUI();
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        });

        btnBuyEnergy.addEventListener('pointerdown', () => {
            if (score >= costEnergy) {
                score -= costEnergy;
                maxEnergy += 50;
                costEnergy = Math.floor(costEnergy * 1.5); 
                saveData();
                updateUI();
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        });

        oreImgElement.addEventListener('pointerdown', (e) => {
            if (energy >= 1) {
                if (energy === maxEnergy) {
                    lastTickTime = Date.now();
                }

                energy--;
                score += clickPower; 
                
                saveData();
                updateUI();

                // Вибрация сработает только если открыто внутри Telegram
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('heavy');
                }

                let nowAnim = Date.now();
                let timeSinceLastClick = nowAnim - (lastClickAnimTime === 0 ? (nowAnim - 1000) : lastClickAnimTime);
                lastClickAnimTime = nowAnim;

                let animDuration = Math.max(0.15, Math.min(0.6, timeSinceLastClick / 1000));

                const pickaxe = document.createElement('img');
                pickaxe.src = 'ТВОЯ_КИРКА.png'; // <- НЕ ЗАБУДЬ ВСТАВИТЬ НАЗВАНИЕ КАРТИНКИ КИРКИ
                pickaxe.classList.add('pickaxe-effect');
                pickaxe.style.left = `${e.clientX - 60}px`;
                pickaxe.style.top = `${e.clientY - 80}px`;
                pickaxe.style.animationDuration = `${animDuration}s`;
                document.body.appendChild(pickaxe);

                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-text');
                plusOne.innerText = `+${clickPower}`; 
                plusOne.style.left = `${e.clientX - 15}px`;
                plusOne.style.top = `${e.clientY - 40}px`;
                document.body.appendChild(plusOne);

                const sparkCount = 6 + Math.floor(Math.random() * 3);
                for (let i = 0; i < sparkCount; i++) {
                    const spark = document.createElement('div');
                    spark.classList.add('spark');
                    
                    const offsetX = (Math.random() - 0.5) * 30;
                    const offsetY = (Math.random
