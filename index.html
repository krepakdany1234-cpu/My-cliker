<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ЗАДНИЙ ФОН (Сгенерированный заросший город) --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            user-select: none;
            
            /* Ссылка на нашу сгенерированную картинку */
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Добавляем легкое затемнение фона, чтобы интерфейс лучше выделялся */
            background-color: rgba(0, 0, 0, 0.4);
            background-blend-mode: overlay;
        }

        /* --- СЧЕТЧИК (Деревянная табличка гильдии) --- */
        .guild-board {
            background-color: #5c3a21;
            border: 4px solid #361f0e;
            border-radius: 8px;
            padding: 15px 40px;
            margin-bottom: 60px;
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.8),
                inset 0 0 15px rgba(0,0,0,0.5);
            position: relative;
            text-align: center;
        }

        .guild-board::before, .guild-board::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 8px;
            height: 8px;
            background-color: #1a0f07;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #4a4a4a;
        }
        .guild-board::before { left: 10px; }
        .guild-board::after { right: 10px; }

        .greeting {
            color: #d4af37;
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px #000;
        }

        .score-container {
            color: #fff8e7;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }

        /* --- КНОПКА (Мифриловая руда) --- */
        .mithril-ore {
            width: 200px;
            height: 190px;
            border-radius: 40% 60% 55% 45% / 50% 45% 65% 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #80deea, #006064);
            box-shadow: 
                0 0 40px rgba(0, 188, 212, 0.6),
                inset -10px -10px 20px rgba(0,0,0,0.5),
                inset 10px 10px 20px rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .mithril-ore:active {
            transform: scale(0.9) rotate(-3deg);
            box-shadow: 
                0 0 60px rgba(0, 188, 212, 0.9), 
                inset -5px -5px 10px rgba(0,0,0,0.5), 
                inset 5px 5px 10px rgba(255,255,255,0.8);
        }

        .floating-text {
            position: absolute;
            color: #80deea;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 5px #00bcd4;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="guild-board">
        <div class="greeting" id="greeting">Авантюрист</div>
        <div class="score-container" id="score">0</div>
    </div>

    <div class="mithril-ore" id="ore">💎</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let score = 0;
        const scoreElement = document.getElementById('score');
        const oreElement = document.getElementById('ore');
        const greetingElement = document.getElementById('greeting');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingElement.innerText = tg.initDataUnsafe.user.first_name;
        }

        oreElement.addEventListener('pointerdown', (e) => {
            score++;
            scoreElement.innerText = score;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            const plusOne = document.createElement('div');
            plusOne.classList.add('floating-text');
            plusOne.innerText = '+1';
            
            plusOne.style.left = `${e.clientX - 10}px`;
            plusOne.style.top = `${e.clientY - 20}px`;
            
            document.body.appendChild(plusOne);

            setTimeout(() => {
                plusOne.remove();
            }, 1000);
        });
    </script>
</body>
</html>
