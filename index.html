<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Telegram Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Стили страницы */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Используем цвета из темы Telegram пользователя */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            user-select: none; /* Запрещаем выделение текста */
        }

        .greeting {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .score-container {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 50px;
        }

        /* Стили самой монетки/кнопки */
        .coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 25px rgba(255, 165, 0, 0.5);
            cursor: pointer;
            transition: transform 0.05s ease-in-out;
            -webkit-tap-highlight-color: transparent; /* Убираем синюю подсветку на мобилках */
        }

        /* Анимация при нажатии */
        .coin:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <div class="greeting" id="greeting">Привет, игрок!</div>
    <div class="score-container" id="score">0</div>
    <div class="coin" id="coin">TAP!</div>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Разворачиваем приложение на весь экран мобильного телефона
        tg.expand();
        
        // Сообщаем Telegram, что приложение готово к отображению
        tg.ready();

        let score = 0;
        const scoreElement = document.getElementById('score');
        const coinElement = document.getElementById('coin');
        const greetingElement = document.getElementById('greeting');

        // Если приложение открыто в Telegram, получаем имя пользователя
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingElement.innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
        }

        // Обрабатываем клик по монетке
        coinElement.addEventListener('pointerdown', (e) => {
            // Увеличиваем счет
            score++;
            scoreElement.innerText = score;

            // Включаем легкую вибрацию на телефоне (если поддерживается)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });
    </script>
</body>
</html>
