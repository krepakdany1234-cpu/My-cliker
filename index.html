<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- БАЗОВЫЕ НАСТРОЙКИ И ЗАЩИТА --- */
        * {
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;           
            -webkit-user-drag: none;     
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.6);
            background-blend-mode: overlay;
            overflow: hidden; 
        }

        /* --- ТАБЛИЧКА И СЧЕТ --- */
        .guild-board {
            background-image: url('1000019094-removebg-preview.png');
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            width: 390px; 
            padding-top: 90px;    
            padding-bottom: 80px; 
            padding-left: 40px;   
            padding-right: 40px;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));
            margin-bottom: 20px; 
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-container {
            color: #1a0b02; 
            font-size: 3.4rem; 
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.25), -1px -1px 2px rgba(0, 0, 0, 0.9);
            margin-bottom: 12px;
            z-index: 2;
        }

        /* --- ЭНЕРГИЯ --- */
        .energy-wrapper {
            width: 65%; 
            background-color: rgba(10, 5, 0, 0.5); 
            border: 1px solid rgba(0,0,0,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            height: 12px; 
            overflow: hidden;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.9); 
            z-index: 2;
        }

        .energy-bar {
            height: 100%; 
            width: 100%;
            background: linear-gradient(90deg, #2e7d32, #50b487, #81c784); 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5); 
            transition: width 0.3s ease-out;
        }

        .energy-text {
            color: #ffeba1; 
            font-size: 0.85rem; 
            margin-top: 8px;
            font-weight: bold;
            white-space: nowrap; 
            text-shadow: 1px 1px 3px #000, -1px -1px 1px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* --- РУДА --- */
        .ore-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .crystal-img {
            width: 280px; 
            height: auto;
            filter: drop-shadow(0 25px 15px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 30px rgba(100, 255, 150, 0.4));
            transition: transform 0.1s ease, filter 0.1s ease;
            cursor: pointer; 
        }

        .crystal-img:active {
            transform: scale(0.95) translateY(5px);
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 45px rgba(100, 255, 150, 0.8));
        }

        /* --- ЭФФЕКТЫ --- */
        .floating-text {
            position: absolute;
            color: #a5d6a7;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #50b487, 1px 1px 2px #000;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }

        .pickaxe-effect {
            position: absolute;
            width: 100px; 
            height: auto;
            pointer-events: none;
            z-index: 50;
            transform-origin: bottom right; 
            animation: mineStrike ease-in-out forwards;
            filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.7));
        }
        @keyframes mineStrike {
            0% { transform: rotate(-30deg) scale(1.1); opacity: 0; }
            30% { transform: rotate(-70deg) scale(1.2); opacity: 1; } 
            60% { transform: rotate(15deg) scale(1.1); opacity: 1; }  
            100% { transform: rotate(25deg) scale(0.9); opacity: 0; } 
        }

        .spark {
            position: absolute;
            width: 8px; height: 8px;
            background-color: #ffffff; 
            border-radius: 50%;
            pointer-events: none;
            z-index: 45;
            box-shadow: 0 0 8px #fff, 0 0 15px #ffd700, 0 0 25px #ff8c00;
            animation: sparkFly 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }
        @keyframes sparkFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { opacity: 1; } 
            100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
        }

        /* --- МАГАЗИН --- */
        .open-shop-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: linear-gradient(to bottom, #8b5a2b, #4e342e);
            border: 2px solid #2a1610;
            color: #ffeba1;
            padding: 12px 25px;
            font-family: 'Georgia', serif;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,255,255,0.2);
            cursor: pointer;
            text-shadow: 1px 1px 2px #000;
            z-index: 20;
            transition: transform 0.1s;
        }
        .open-shop-btn:active { transform: scale(0.95); }

        .shop-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(3px); 
        }

        .shop-modal {
            background: linear-gradient(to bottom, #5c3a21, #3e2723);
            border: 4px solid #1a0b02;
            border-radius: 15px;
            width: 90%; 
            max-width: 400px;
            padding: 20px;
            color: #ffeba1;
            box-shadow: 0 10px 30px rgba(0,0,0,1), inset 0 0 20px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
        }

        .close-shop-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.8rem; 
            color: #ff5252; 
            cursor: pointer; 
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .shop-title {
            font-size: 1.8rem; 
            margin-top: 0; margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000; 
            border-bottom: 2px solid #8b5a2b; 
            padding-bottom: 10px;
            color: #ffd700;
        }

        .shop-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 15px;
            border: 1px solid #8b5a2b; 
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .shop-item-info h3 { 
            margin: 0 0 5px 0; font-size: 1.1rem; color: #ffd700; text-shadow: 1px 1px 2px #000;
        }
        .shop-item-info p { 
            margin: 0; font-size: 0.85rem; color: #a5d6a7; text-shadow: 1px 1px 1px #000;
        }

        .shop-buy-btn {
            background: linear-gradient(to bottom, #2e7d32, #1b5e20);
            border: 1px solid #000; 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 8px;
            font-weight: bold; 
            font-family: 'Georgia', serif;
            cursor: pointer; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.3);
            text-shadow: 1px 1px 1px #000;
            min-width: 80px;
        }
        .shop-buy-btn:active { transform: scale(0.95); }
        .shop-buy-btn:disabled { 
            background: linear-gradient(to bottom, #555, #333); 
            color: #888; cursor: not-allowed; box-shadow: none;
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <div class="guild-board">
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">Загрузка...</div>
    </div>

    <div class="ore-wrapper">
        <img src="1000019091-removebg-preview.png" alt="Кристалл" class="crystal-img" id="ore-img" draggable="false">
    </div>

    <button class="open-shop-btn" id="open-shop">🛒 Лавка</button>

    <div class="shop-overlay" id="shop-modal">
        <div class="shop-modal">
            <div class="close-shop-btn" id="close-shop">✖</div>
            <h2 class="shop-title">Торговая Лавка</h2>

            <div class="shop-item">
                <div class="shop-item-info">
                    <h3>⚒️ Острая кирка</h3>
                    <p>Добыча за клик: +1</p>
                    <p style="color: #ffb74d; font-size: 0.8rem; margin-top: 3px;">Текущий уровень: <span id="lvl-pickaxe">1</span></p>
                </div>
                <button class="shop-buy-btn" id="buy-pickaxe">2500 💎</button>
            </div>

            <div class="shop-item">
                <div class="shop-item-info">
                    <h3>🎒 Гномья сумка</h3>
                    <p>Макс. энергия: +50</p>
                    <p style="color: #ffb74d; font-size: 0.8rem; margin-top: 3px;">Текущий запас: <span id="lvl-energy">500</span></p>
                </div>
                <button class="shop-buy-btn" id="buy-energy">100 💎</button>
            </div>
        </div>
    </div>

    <script>
        try {
            // 1. Защита от выделения и горячих клавиш
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('dragstart', e => e.preventDefault());
            document.addEventListener('selectstart', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                }
            });

            // 2. Инициализация Telegram
            let tg = window.Telegram ? window.Telegram.WebApp : null;
            if (tg) tg.expand();

            // 3. Загрузка данных из памяти
            let score = parseInt(localStorage.getItem('mithrilScore')) || 0;
            let clickPower = parseInt(localStorage.getItem('mithrilClickPower')) || 1;
            let maxEnergy = parseInt(localStorage.getItem('mithrilMaxEnergy')) || 500;
            let costPickaxe = parseInt(localStorage.getItem('mithrilCostPickaxe')) || 2500;
            let costEnergy = parseInt(localStorage.getItem('mithrilCostEnergy')) || 100;
            
            // Лечим старые сохранения, если цена кирки была сломана
            if (clickPower === 1 && costPickaxe < 2500) costPickaxe = 2500;

            let energy = parseInt(localStorage.getItem('mithrilEnergy'));
            if (isNaN(energy)) energy = maxEnergy;

            let lastTickTime = parseInt(localStorage.getItem('lastTickTime')) || Date.now();
            const regenAmount = 100;
            const regenIntervalMs = 5 * 60 * 1000;
            let lastClickAnimTime = 0;

            // 4. Основные функции
            function saveData() {
                localStorage.setItem('mithrilScore', score);
                localStorage.setItem('mithrilEnergy', energy);
                localStorage.setItem('lastTickTime', lastTickTime);
                localStorage.setItem('mithrilClickPower', clickPower);
                localStorage.setItem('mithrilMaxEnergy', maxEnergy);
                localStorage.setItem('mithrilCostPickaxe', costPickaxe);
                localStorage.setItem('mithrilCostEnergy', costEnergy);
            }

            function updateUI() {
                document.getElementById('score').innerText = score;
                document.getElementById('energy-bar').style.width = Math.min(100, (energy / maxEnergy) * 100) + '%';
                
                let textEl = document.getElementById('energy-text');
                if (energy >= maxEnergy) {
                    textEl.innerText = `${energy} / ${maxEnergy} ⚡ (Максимум)`;
                } else {
                    let timeLeft = Math.max(0, regenIntervalMs - (Date.now() - lastTickTime));
                    let m = Math.floor(timeLeft / 60000);
                    let s = Math.floor((timeLeft % 60000) / 1000);
                    textEl.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${m}:${s < 10 ? '0' : ''}${s})`;
                }

                document.getElementById('lvl-pickaxe').innerText = clickPower;
                document.getElementById('lvl-energy').innerText = maxEnergy;
                document.getElementById('buy-pickaxe').innerText = `${costPickaxe} 💎`;
                document.getElementById('buy-energy').innerText = `${costEnergy} 💎`;
                
                document.getElementById('buy-pickaxe').disabled = score < costPickaxe;
                document.getElementById('buy-energy').disabled = score < costEnergy;
            }

            function checkRegen() {
                let now = Date.now();
                if (energy < maxEnergy) {
                    let passed = now - lastTickTime;
                    if (passed >= regenIntervalMs) {
                        let ticks = Math.floor(passed / regenIntervalMs);
                        energy = Math.min(maxEnergy, energy + (ticks * regenAmount));
                        lastTickTime += ticks * regenIntervalMs; 
                        saveData();
                    }
                } else {
                    lastTickTime = now;
                }
                updateUI();
            }

            // Запускаем интерфейс (Убирает "Загрузка...")
            checkRegen();
            setInterval(checkRegen, 1000);

            // 5. Кнопки магазина
            document.getElementById('open-shop').onclick = () => {
                updateUI();
                document.getElementById('shop-modal').style.display = 'flex';
            };
            
            document.getElementById('close-shop').onclick = () => {
                document.getElementById('shop-modal').style.display = 'none';
            };

            document.getElementById('buy-pickaxe').onclick = () => {
                if (score >= costPickaxe) {
                    score -= costPickaxe;
                    clickPower++;
                    costPickaxe = Math.floor(costPickaxe * 1.5);
                    saveData();
                    updateUI();
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }
            };

            document.getElementById('buy-energy').onclick = () => {
                if (score >= costEnergy) {
                    score -= costEnergy;
                    maxEnergy += 50;
                    costEnergy = Math.floor(costEnergy * 1.5);
                    saveData();
                    updateUI();
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }
            };

            // 6. Клик по руде
            document.getElementById('ore-img').addEventListener('pointerdown', (e) => {
                if (energy >= 1) {
                    if (energy === maxEnergy) lastTickTime = Date.now();
                    
                    energy--;
                    score += clickPower;
                    saveData();
                    updateUI();

                    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

                    let nowAnim = Date.now();
                    let timeSinceLastClick = nowAnim - (lastClickAnimTime || nowAnim - 1000);
                    lastClickAnimTime = nowAnim;
                    let animDuration = Math.max(0.15, Math.min(0.6, timeSinceLastClick / 1000));

                    // КИРКА
                    const pickaxe = document.createElement('img');
                    pickaxe.src = '1000019118-removebg-preview.png'; // <--- ВСТАВЬ НАЗВАНИЕ СВОЕЙ КАРТИНКИ ТУТ
                    pickaxe.className = 'pickaxe-effect';
                    pickaxe.style.left = `${e.clientX - 60}px`;
                    pickaxe.style.top = `${e.clientY - 80}px`;
                    pickaxe.style.animationDuration = `${animDuration}s`;
                    document.body.appendChild(pickaxe);

                    // ЦИФРА УРОНА
                    const plusOne = document.createElement('div');
                    plusOne.className = 'floating-text';
                    plusOne.innerText = `+${clickPower}`;
                    plusOne.style.left = `${e.clientX - 15}px`;
                    plusOne.style.top = `${e.clientY - 40}px`;
                    document.body.appendChild(plusOne);

                    // ИСКРЫ
                    const sparkCount = 6 + Math.floor(Math.random() * 3);
                    for (let i = 0; i < sparkCount; i++) {
                        const spark = document.createElement('div');
                        spark.className = 'spark';
                        spark.style.left = `${e.clientX + (Math.random() - 0.5) * 30}px`;
                        spark.style.top = `${e.clientY - 10 + (Math.random() - 0.5) * 30}px`;
                        spark.style.setProperty('--tx', `${(Math.random() - 0.5) * 160}px`);
                        spark.style.setProperty('--ty', `${(Math.random() - 0.5) * 160}px`);
                        document.body.appendChild(spark);
                        setTimeout(() => spark.remove(), 600);
                    }

                    setTimeout(() => pickaxe.remove(), animDuration * 1000);
                    setTimeout(() => plusOne.remove(), 1000);
                } else {
                    let textEl = document.getElementById('energy-text');
                    textEl.style.color = '#ff5252';
                    setTimeout(() => textEl.style.color = '#ffeba1', 300);
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                }
            });

        } catch (err) {
            // Если случится невозможное, ошибка напечатается прямо на доске
            document.getElementById('energy-text').innerText = "ОШИБКА: " + err.message;
        }
    </script>
</body>
</html>
