<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ЗАДНИЙ ФОН (Город) --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            
            /* БАЗОВАЯ ЗАЩИТА: Запрет выделения текста */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.6);
            background-blend-mode: overlay;
        }

        /* --- ТАБЛИЧКА --- */
        .guild-board {
            background: none;
            border: none;
            box-shadow: none;
            
            background-image: url('1000019094-removebg-preview.png');
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            
            width: 390px; 
            
            box-sizing: border-box; 
            padding-top: 90px;    
            padding-bottom: 80px; 
            padding-left: 40px;   
            padding-right: 40px;
            
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));
            
            margin-bottom: 20px; 
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Счет */
        .score-container {
            color: #1a0b02; 
            font-size: 3.4rem; 
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.25), -1px -1px 2px rgba(0, 0, 0, 0.9);
            margin-bottom: 12px;
            z-index: 2;
        }

        /* --- ПОЛОСКА ЭНЕРГИИ --- */
        .energy-wrapper {
            width: 65%; 
            background-color: rgba(10, 5, 0, 0.5); 
            border: 1px solid rgba(0,0,0,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.15); 
            border-radius: 8px; 
            height: 12px; 
            overflow: hidden;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.9); 
            z-index: 2;
        }

        .energy-bar {
            height: 100%; 
            width: 100%;
            background: linear-gradient(90deg, #2e7d32, #50b487, #81c784); 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5); 
            transition: width 0.3s ease-out;
        }

        /* Текст энергии: СДЕЛАЛИ ЯРКИМ И ЧИТАЕМЫМ */
        .energy-text {
            color: #ffeba1; /* Яркий светло-золотистый/древесный цвет */
            font-size: 0.85rem; /* Чуть-чуть увеличили для читаемости */
            margin-top: 8px;
            font-family: 'Georgia', serif; 
            font-weight: bold;
            letter-spacing: 0.5px; 
            white-space: nowrap; 
            /* Плотная черная тень-обводка, чтобы буквы выделялись на темном дереве */
            text-shadow: 1px 1px 3px #000, -1px -1px 1px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* --- КАРТИНКА РУДЫ --- */
        .ore-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .crystal-img {
            width: 280px; 
            height: auto;
            filter: drop-shadow(0 25px 15px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 30px rgba(100, 255, 150, 0.4));
            transition: transform 0.1s ease, filter 0.1s ease;
            
            /* ЗАЩИТА */
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .ore-wrapper:active .crystal-img {
            transform: scale(0.95) translateY(5px);
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 45px rgba(100, 255, 150, 0.8));
        }

        .floating-text {
            position: absolute;
            color: #a5d6a7;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #50b487, 1px 1px 2px #000;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="guild-board">
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">Загрузка...</div>
    </div>

    <div class="ore-wrapper" id="ore">
        <img src="1000019091-removebg-preview.png" alt="Кристалл" class="crystal-img" draggable="false">
    </div>

    <script>
        // --- БЛОК ЗАЩИТЫ ОТ КОПИРОВАНИЯ И КОНСОЛИ ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && e.key === 'I') || 
               (e.ctrlKey && e.shiftKey && e.key === 'C') ||
               (e.ctrlKey && e.shiftKey && e.key === 'J') || 
               (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });

        document.addEventListener('selectstart', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault());

        // --- ОСНОВНОЙ КОД ИГРЫ ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const scoreElement = document.getElementById('score');
        const oreElement = document.getElementById('ore');
        const energyBar = document.getElementById('energy-bar');
        const energyTextElement = document.getElementById('energy-text');

        const maxEnergy = 500;
        const regenAmount = 100;
        const regenIntervalMs = 5 * 60 * 1000;

        let score = parseInt(localStorage.getItem('mithrilScore')) || 0;
        let energy = parseInt(localStorage.getItem('mithrilEnergy'));
        if (isNaN(energy)) energy = maxEnergy;

        let lastTickTime = parseInt(localStorage.getItem('lastTickTime')) || Date.now();

        function checkEnergyRegen() {
            let now = Date.now();
            if (energy < maxEnergy) {
                let timePassed = now - lastTickTime;
                
                if (timePassed >= regenIntervalMs) {
                    let ticks = Math.floor(timePassed / regenIntervalMs);
                    energy += ticks * regenAmount;
                    if (energy > maxEnergy) energy = maxEnergy;
                    
                    lastTickTime += ticks * regenIntervalMs; 
                    saveData();
                }
            } else {
                lastTickTime = now;
            }
        }

        function updateUI() {
            scoreElement.innerText = score;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;

            if (energy >= maxEnergy) {
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (Максимум)`;
            } else {
                let now = Date.now();
                let timeLeftMs = regenIntervalMs - (now - lastTickTime);
                if (timeLeftMs < 0) timeLeftMs = 0;
                
                let minutes = Math.floor(timeLeftMs / 60000);
                let seconds = Math.floor((timeLeftMs % 60000) / 1000);
                let timeString = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${timeString})`;
            }
        }

        function saveData() {
            localStorage.setItem('mithrilScore', score);
            localStorage.setItem('mithrilEnergy', energy);
            localStorage.setItem('lastTickTime', lastTickTime);
        }

        checkEnergyRegen();
        updateUI();
        
        setInterval(() => {
            checkEnergyRegen();
            updateUI();
        }, 1000);

        oreElement.addEventListener('pointerdown', (e) => {
            if (energy >= 1) {
                if (energy === maxEnergy) {
                    lastTickTime = Date.now();
                }

                energy--;
                score++;
                
                saveData();
                updateUI();

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-text');
                plusOne.innerText = '+1';
                
                plusOne.style.left = `${e.clientX - 15}px`;
                plusOne.style.top = `${e.clientY - 40}px`;
                
                document.body.appendChild(plusOne);

                setTimeout(() => {
                    plusOne.remove();
                }, 1000);
            } else {
                energyTextElement.style.color = '#ff5252';
                // Возвращаем светлый цвет после мигания красным
                setTimeout(() => energyTextElement.style.color = '#ffeba1', 300);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });
    </script>
</body>
</html>
