<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ЗАДНИЙ ФОН --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            user-select: none;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: overlay;
        }

        /* --- СЧЕТЧИК (Деревянная табличка) --- */
        .guild-board {
            background-color: #5c3a21;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.05) 0px, rgba(0, 0, 0, 0.05) 2px, transparent 2px, transparent 12px),
                linear-gradient(to bottom, #6a4022, #3e2412);
            border: 4px solid #2a160a;
            border-radius: 8px;
            padding: 15px 25px;
            margin-bottom: 40px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            position: relative;
            text-align: center;
            width: 240px;
        }

        .guild-board::before, .guild-board::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 8px;
            height: 8px;
            background-color: #120a05;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #555, 0 1px 1px rgba(255,255,255,0.2);
        }
        .guild-board::before { left: 10px; }
        .guild-board::after { right: 10px; }

        .greeting {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .score-container {
            color: #fff8e7;
            font-size: 3.2rem;
            font-weight: bold;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.9);
            margin-bottom: 15px;
        }

        /* --- ПОЛОСКА ЭНЕРГИИ --- */
        .energy-wrapper {
            width: 100%;
            background-color: #1a0f07;
            border: 2px solid #000;
            border-radius: 10px;
            height: 14px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }

        .energy-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4caf50, #1b5e20); /* Зеленая энергия под цвет кристалла */
            transition: width 0.3s ease-out;
        }

        .energy-text {
            color: #a5d6a7;
            font-size: 0.85rem;
            margin-top: 8px;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 2px #000;
        }

        /* --- ПЛОТНЫЙ ИЗУМРУДНЫЙ КРИСТАЛЛ (КАК НА ФОТО) --- */
        .ore-wrapper {
            filter: drop-shadow(0 0 30px rgba(76, 175, 80, 0.4)); /* Зеленое свечение вокруг */
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            margin-top: 10px;
        }

        .mithril-ore {
            width: 140px;
            height: 260px;
            
            /* Форма кристалла с фото (острый верх, сужающийся низ) */
            clip-path: polygon(50% 0%, 90% 20%, 90% 85%, 50% 100%, 10% 85%, 10% 20%);
            
            /* Плотный цвет с градиентами граней */
            background-color: #1b5e20;
            background-image: 
                /* Левая светлая грань */
                linear-gradient(105deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.15) 25%, transparent 25%),
                /* Правая темная грань */
                linear-gradient(-105deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.3) 25%, transparent 25%),
                /* Основной цвет от светлого центра к темным краям */
                radial-gradient(ellipse at center, #4caf50 0%, #1b5e20 80%);
            
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Имитация центральной ромбовидной грани (как на фото) */
        .mithril-ore::before {
            content: '';
            position: absolute;
            top: 25%;
            left: 20%;
            width: 60%;
            height: 50%;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ore-content {
            font-size: 3.5rem;
            /* Легкая тень под эмодзи, чтобы он читался внутри кристалла */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            z-index: 2;
        }

        /* Анимация нажатия */
        .ore-wrapper:active {
            transform: scale(0.95);
            filter: drop-shadow(0 0 50px rgba(76, 175, 80, 0.8));
        }

        /* Летающие циферки */
        .floating-text {
            position: absolute;
            color: #69f0ae;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #00e676, 1px 1px 2px #000;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="guild-board">
        <div class="greeting" id="greeting">Авантюрист</div>
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">Загрузка...</div>
    </div>

    <div class="ore-wrapper" id="ore">
        <div class="mithril-ore">
            <div class="ore-content">💎</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const scoreElement = document.getElementById('score');
        const oreElement = document.getElementById('ore');
        const greetingElement = document.getElementById('greeting');
        const energyBar = document.getElementById('energy-bar');
        const energyTextElement = document.getElementById('energy-text');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingElement.innerText = tg.initDataUnsafe.user.first_name;
        }

        // --- НАСТРОЙКИ ИГРЫ ---
        const maxEnergy = 500;
        const regenAmount = 100; // Сколько восстанавливать
        const regenIntervalMs = 5 * 60 * 1000; // 5 минут в миллисекундах (300 000 мс)

        // --- ЗАГРУЗКА ДАННЫХ ---
        let score = parseInt(localStorage.getItem('mithrilScore')) || 0;
        let energy = parseInt(localStorage.getItem('mithrilEnergy'));
        if (isNaN(energy)) energy = maxEnergy;

        // Время последнего добавления энергии
        let lastTickTime = parseInt(localStorage.getItem('lastTickTime')) || Date.now();

        // --- ФУНКЦИЯ ПРОВЕРКИ И НАЧИСЛЕНИЯ ЭНЕРГИИ ---
        function checkEnergyRegen() {
            let now = Date.now();
            if (energy < maxEnergy) {
                let timePassed = now - lastTickTime;
                
                // Если прошло больше 5 минут
                if (timePassed >= regenIntervalMs) {
                    let ticks = Math.floor(timePassed / regenIntervalMs); // Считаем, сколько раз по 5 мин прошло
                    energy += ticks * regenAmount;
                    if (energy > maxEnergy) energy = maxEnergy;
                    
                    // Сдвигаем время последнего начисления
                    lastTickTime += ticks * regenIntervalMs; 
                    saveData();
                }
            } else {
                // Если энергия полная, держим таймер на текущем времени, чтобы не начислять сразу после клика
                lastTickTime = now;
            }
        }

        // --- ОБНОВЛЕНИЕ ТАЙМЕРА НА ЭКРАНЕ ---
        function updateUI() {
            scoreElement.innerText = score;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;

            if (energy >= maxEnergy) {
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (Максимум)`;
            } else {
                let now = Date.now();
                let timeLeftMs = regenIntervalMs - (now - lastTickTime);
                if (timeLeftMs < 0) timeLeftMs = 0;
                
                // Перевод миллисекунд в Минуты:Секунды
                let minutes = Math.floor(timeLeftMs / 60000);
                let seconds = Math.floor((timeLeftMs % 60000) / 1000);
                let timeString = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${timeString})`;
            }
        }

        // Сохранение в память
        function saveData() {
            localStorage.setItem('mithrilScore', score);
            localStorage.setItem('mithrilEnergy', energy);
            localStorage.setItem('lastTickTime', lastTickTime);
        }

        // --- ИГРОВОЙ ЦИКЛ (вызывается каждую секунду) ---
        checkEnergyRegen(); // Проверка при старте
        updateUI();
        
        setInterval(() => {
            checkEnergyRegen();
            updateUI();
        }, 1000);

        // --- ОБРАБОТКА КЛИКА ---
        oreElement.addEventListener('pointerdown', (e) => {
            if (energy >= 1) {
                // Если энергия была полная, начинаем отсчет 5 минут с этого момента
                if (energy === maxEnergy) {
                    lastTickTime = Date.now();
                }

                energy--;
                score++;
                
                saveData();
                updateUI();

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-text');
                plusOne.innerText = '+1';
                
                plusOne.style.left = `${e.clientX - 15}px`;
                plusOne.style.top = `${e.clientY - 40}px`;
                
                document.body.appendChild(plusOne);

                setTimeout(() => {
                    plusOne.remove();
                }, 1000);
            } else {
                energyTextElement.style.color = '#ff5252';
                setTimeout(() => energyTextElement.style.color = '#a5d6a7', 300);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });
    </script>
</body>
</html>
