<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ЗАДНИЙ ФОН --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            user-select: none;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.6);
            background-blend-mode: overlay;
        }

        /* --- СЧЕТЧИК (Деревянная табличка) --- */
        .guild-board {
            background-color: #5c3a21;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.05) 0px, rgba(0, 0, 0, 0.05) 2px, transparent 2px, transparent 12px),
                linear-gradient(to bottom, #6a4022, #3e2412);
            border: 4px solid #2a160a;
            border-radius: 8px;
            padding: 15px 25px;
            margin-bottom: 20px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            position: relative;
            text-align: center;
            width: 240px;
        }

        .guild-board::before, .guild-board::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 8px;
            height: 8px;
            background-color: #120a05;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #555, 0 1px 1px rgba(255,255,255,0.2);
        }
        .guild-board::before { left: 10px; }
        .guild-board::after { right: 10px; }

        .greeting {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .score-container {
            color: #fff8e7;
            font-size: 3.2rem;
            font-weight: bold;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.9);
            margin-bottom: 15px;
        }

        /* --- ПОЛОСКА ЭНЕРГИИ --- */
        .energy-wrapper {
            width: 100%;
            background-color: #1a0f07;
            border: 2px solid #000;
            border-radius: 10px;
            height: 14px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }

        .energy-bar {
            height: 100%;
            width: 100%;
            /* Цвет энергии теперь тоже голубо-изумрудный */
            background: linear-gradient(90deg, #00ffff, #00bfa5, #006064); 
            transition: width 0.3s ease-out;
        }

        .energy-text {
            color: #84ffff;
            font-size: 0.85rem;
            margin-top: 8px;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 2px #000;
        }

        /* --- ОБЩАЯ ОБЕРТКА (Свечение и тень) --- */
        .ore-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Черная тень от камней вниз + голубо-изумрудное свечение вокруг */
            filter: drop-shadow(0 25px 15px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 35px rgba(0, 255, 200, 0.5));
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            margin-top: 20px;
        }

        /* --- 3D КРИСТАЛЛ (СТЕКЛО И СВЕТ) --- */
        .mithril-ore {
            width: 140px;
            height: 280px;
            clip-path: polygon(50% 0%, 95% 25%, 85% 90%, 50% 100%, 15% 90%, 5% 25%);
            
            /* Сложные блики и голубо-изумрудное свечение */
            background: 
                /* Острый белый блик слева (отражение света) */
                linear-gradient(105deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.1) 25%, transparent 26%),
                /* Глубокая тень справа */
                linear-gradient(-105deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 25%, transparent 26%),
                /* Светлая верхушка */
                linear-gradient(to bottom, rgba(255,255,255,0.5) 0%, transparent 20%),
                /* Магическое ядро (Cyan -> Emerald -> Dark Green) */
                radial-gradient(ellipse at 50% 55%, #00ffff 0%, #00bfa5 40%, #004d40 80%, #00261c 100%);
                
            position: relative;
            z-index: 2; /* Кристалл находится ПОД передними камнями */
        }

        /* Центральная ромбовидная грань кристалла */
        .mithril-ore::before {
            content: '';
            position: absolute;
            top: 15%; left: 15%; right: 15%; bottom: 20%;
            clip-path: polygon(50% 0%, 100% 45%, 50% 100%, 0% 45%);
            background: 
                /* Яркий эпицентр свечения */
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.9) 0%, rgba(0, 255, 200, 0.6) 30%, transparent 70%),
                /* Скошенный блик по диагонали */
                linear-gradient(135deg, rgba(255,255,255,0.5) 0%, transparent 40%, rgba(0,0,0,0.3) 100%),
                rgba(0, 191, 165, 0.4);
            /* Тонкая светлая рамка создает эффект твердого стекла */
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* --- ГРУДА КАМНЕЙ (ОСНОВАНИЕ) --- */
        .rock-container {
            position: absolute;
            bottom: -15px;
            width: 180px;
            height: 70px;
            z-index: 3; /* Камни ПЕРЕКРЫВАЮТ низ кристалла (эффект врастания) */
            pointer-events: none;
        }

        /* Центральный передний камень */
        .rock-center {
            position: absolute;
            left: 50%; transform: translateX(-50%);
            bottom: 5px;
            width: 100px; height: 50px;
            background: linear-gradient(145deg, #504b44 0%, #292521 100%);
            clip-path: polygon(10% 80%, 25% 30%, 50% 15%, 75% 35%, 90% 85%, 50% 100%);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1);
        }

        /* Левый камень */
        .rock-left {
            position: absolute;
            left: 15px; bottom: -5px;
            width: 80px; height: 45px;
            background: linear-gradient(110deg, #635b51 0%, #2c2824 100%);
            clip-path: polygon(5% 90%, 20% 40%, 50% 15%, 85% 50%, 95% 95%, 40% 100%);
        }

        /* Правый камень */
        .rock-right {
            position: absolute;
            right: 15px; bottom: 0px;
            width: 75px; height: 40px;
            background: linear-gradient(-110deg, #534c44 0%, #1f1b18 100%);
            clip-path: polygon(95% 85%, 80% 30%, 50% 10%, 15% 45%, 5% 90%, 60% 100%);
        }

        /* Голубое свечение на камнях (отсвет от кристалла) */
        .rock-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 200, 0.35) 0%, transparent 60%);
            z-index: 4;
        }

        /* --- АНИМАЦИЯ НАЖАТИЯ --- */
        .ore-wrapper:active {
            transform: scale(0.96) translateY(6px);
            filter: drop-shadow(0 15px 10px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 50px rgba(0, 255, 200, 0.8));
        }

        /* Летающие циферки */
        .floating-text {
            position: absolute;
            color: #84ffff;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #00e676, 1px 1px 2px #000;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="guild-board">
        <div class="greeting" id="greeting">Авантюрист</div>
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">Загрузка...</div>
    </div>

    <div class="ore-wrapper" id="ore">
        <div class="mithril-ore"></div>
        
        <div class="rock-container">
            <div class="rock-left"></div>
            <div class="rock-right"></div>
            <div class="rock-center"></div>
            <div class="rock-glow"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const scoreElement = document.getElementById('score');
        const oreElement = document.getElementById('ore');
        const greetingElement = document.getElementById('greeting');
        const energyBar = document.getElementById('energy-bar');
        const energyTextElement = document.getElementById('energy-text');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingElement.innerText = tg.initDataUnsafe.user.first_name;
        }

        const maxEnergy = 500;
        const regenAmount = 100;
        const regenIntervalMs = 5 * 60 * 1000;

        let score = parseInt(localStorage.getItem('mithrilScore')) || 0;
        let energy = parseInt(localStorage.getItem('mithrilEnergy'));
        if (isNaN(energy)) energy = maxEnergy;

        let lastTickTime = parseInt(localStorage.getItem('lastTickTime')) || Date.now();

        function checkEnergyRegen() {
            let now = Date.now();
            if (energy < maxEnergy) {
                let timePassed = now - lastTickTime;
                
                if (timePassed >= regenIntervalMs) {
                    let ticks = Math.floor(timePassed / regenIntervalMs);
                    energy += ticks * regenAmount;
                    if (energy > maxEnergy) energy = maxEnergy;
                    
                    lastTickTime += ticks * regenIntervalMs; 
                    saveData();
                }
            } else {
                lastTickTime = now;
            }
        }

        function updateUI() {
            scoreElement.innerText = score;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;

            if (energy >= maxEnergy) {
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (Максимум)`;
            } else {
                let now = Date.now();
                let timeLeftMs = regenIntervalMs - (now - lastTickTime);
                if (timeLeftMs < 0) timeLeftMs = 0;
                
                let minutes = Math.floor(timeLeftMs / 60000);
                let seconds = Math.floor((timeLeftMs % 60000) / 1000);
                let timeString = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${timeString})`;
            }
        }

        function saveData() {
            localStorage.setItem('mithrilScore', score);
            localStorage.setItem('mithrilEnergy', energy);
            localStorage.setItem('lastTickTime', lastTickTime);
        }

        checkEnergyRegen();
        updateUI();
        
        setInterval(() => {
            checkEnergyRegen();
            updateUI();
        }, 1000);

        oreElement.addEventListener('pointerdown', (e) => {
            if (energy >= 1) {
                if (energy === maxEnergy) {
                    lastTickTime = Date.now();
                }

                energy--;
                score++;
                
                saveData();
                updateUI();

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-text');
                plusOne.innerText = '+1';
                
                plusOne.style.left = `${e.clientX - 15}px`;
                plusOne.style.top = `${e.clientY - 40}px`;
                
                document.body.appendChild(plusOne);

                setTimeout(() => {
                    plusOne.remove();
                }, 1000);
            } else {
                energyTextElement.style.color = '#ff5252';
                setTimeout(() => energyTextElement.style.color = '#84ffff', 300);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });
    </script>
</body>
</html>
