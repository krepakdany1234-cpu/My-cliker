<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ЗАДНИЙ ФОН --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            user-select: none;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.4);
            background-blend-mode: overlay;
        }

        /* --- СЧЕТЧИК (Деревянная табличка) --- */
        .guild-board {
            background-color: #5c3a21;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.05) 0px, rgba(0, 0, 0, 0.05) 2px, transparent 2px, transparent 12px),
                linear-gradient(to bottom, #6a4022, #3e2412);
            border: 4px solid #2a160a;
            border-radius: 8px;
            padding: 15px 30px;
            margin-bottom: 80px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            position: relative;
            text-align: center;
            width: 220px;
        }

        .guild-board::before, .guild-board::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 8px;
            height: 8px;
            background-color: #120a05;
            border-radius: 50%;
            box-shadow: inset 1px 1px 2px #555, 0 1px 1px rgba(255,255,255,0.2);
        }
        .guild-board::before { left: 10px; }
        .guild-board::after { right: 10px; }

        .greeting {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .score-container {
            color: #fff8e7;
            font-size: 3.2rem;
            font-weight: bold;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.9);
            margin-bottom: 10px;
        }

        /* --- ПОЛОСКА ЭНЕРГИИ --- */
        .energy-wrapper {
            width: 100%;
            background-color: #1a0f07;
            border: 2px solid #000;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }

        .energy-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00b4db, #00838f);
            transition: width 0.1s ease-out;
        }

        .energy-text {
            color: #80deea;
            font-size: 0.9rem;
            margin-top: 5px;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 2px #000;
            transition: color 0.3s ease;
        }

        /* --- ЧИСТАЯ ПОЛУПРОЗРАЧНАЯ РУДА --- */
        .ore-wrapper {
            /* Мягкое голубое свечение вокруг */
            filter: drop-shadow(0 0 25px rgba(0, 188, 212, 0.5));
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .mithril-ore {
            width: 140px;
            height: 140px;
            transform: rotate(45deg);
            border-radius: 20px;
            
            /* Полупрозрачный фон (эффект чистого стекла) */
            background: linear-gradient(135deg, rgba(224, 247, 250, 0.4), rgba(0, 188, 212, 0.1));
            
            /* Размытие того, что находится за кристаллом */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            /* Тонкая светлая рамка, чтобы подчеркнуть форму ромба */
            border: 2px solid rgba(255, 255, 255, 0.4);
            
            /* Внутренний светлый блик без темной грязи */
            box-shadow: inset 10px 10px 25px rgba(255, 255, 255, 0.6);
            
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Красивый диагональный блик света */
        .mithril-ore::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%);
            transform: rotate(-45deg);
            pointer-events: none;
        }

        /* Содержимое внутри руды (эмодзи) */
        .ore-content {
            transform: rotate(-45deg);
            font-size: 4rem;
            opacity: 0.9; /* Тоже немного прозрачный */
        }

        /* Анимация нажатия */
        .ore-wrapper:active {
            transform: scale(0.92);
            filter: drop-shadow(0 0 40px rgba(0, 188, 212, 0.8));
        }

        /* Летающие циферки */
        .floating-text {
            position: absolute;
            color: #e0f7fa;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #00bcd4, 1px 1px 2px #000;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="guild-board">
        <div class="greeting" id="greeting">Авантюрист</div>
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">500 / 500 ⚡</div>
    </div>

    <div class="ore-wrapper" id="ore">
        <div class="mithril-ore">
            <div class="ore-content">💎</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const scoreElement = document.getElementById('score');
        const oreElement = document.getElementById('ore');
        const greetingElement = document.getElementById('greeting');
        const energyBar = document.getElementById('energy-bar');
        const energyTextElement = document.getElementById('energy-text');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingElement.innerText = tg.initDataUnsafe.user.first_name;
        }

        const maxEnergy = 500;
        const energyRegenPerSec = 2;

        let score = parseInt(localStorage.getItem('mithrilScore')) || 0;
        let energy = parseInt(localStorage.getItem('mithrilEnergy'));
        if (isNaN(energy)) energy = maxEnergy;

        let lastSavedTime = parseInt(localStorage.getItem('lastSaveTime'));
        if (lastSavedTime) {
            let secondsOffline = Math.floor((Date.now() - lastSavedTime) / 1000);
            energy += secondsOffline * energyRegenPerSec;
            if (energy > maxEnergy) energy = maxEnergy;
        }

        function updateUI() {
            scoreElement.innerText = score;
            energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡`;
            
            let energyPercent = (energy / maxEnergy) * 100;
            energyBar.style.width = `${energyPercent}%`;

            localStorage.setItem('mithrilScore', score);
            localStorage.setItem('mithrilEnergy', energy);
            localStorage.setItem('lastSaveTime', Date.now());
        }

        updateUI();

        setInterval(() => {
            if (energy < maxEnergy) {
                energy += energyRegenPerSec;
                if (energy > maxEnergy) energy = maxEnergy;
                updateUI();
            }
        }, 1000);

        oreElement.addEventListener('pointerdown', (e) => {
            if (energy >= 1) {
                energy--;
                score++;
                updateUI();

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-text');
                plusOne.innerText = '+1';
                
                plusOne.style.left = `${e.clientX - 15}px`;
                plusOne.style.top = `${e.clientY - 30}px`;
                
                document.body.appendChild(plusOne);

                setTimeout(() => {
                    plusOne.remove();
                }, 1000);
            } else {
                energyTextElement.style.color = '#ff5252';
                setTimeout(() => energyTextElement.style.color = '#80deea', 300);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });
    </script>
</body>
</html>
