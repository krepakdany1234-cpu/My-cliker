<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ЗАДНИЙ ФОН (Город) --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            user-select: none;
            
            background-image: url('1772901742360.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-color: rgba(0, 0, 0, 0.6);
            background-blend-mode: overlay;
        }

        /* --- СЧЕТЧИК (Деревянная табличка) --- */
        .guild-board {
            background-color: #5c3a21;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.05) 0px, rgba(0, 0, 0, 0.05) 2px, transparent 2px, transparent 12px),
                linear-gradient(to bottom, #6a4022, #3e2412);
            border: 4px solid #2a160a;
            border-radius: 8px;
            padding: 15px 25px;
            margin-bottom: 30px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            position: relative;
            text-align: center;
            width: 240px;
        }

        .guild-board::before, .guild-board::after {
            content: '';
            position: absolute;
            top: 10px; width: 8px; height: 8px;
            background-color: #120a05; border-radius: 50%;
            box-shadow: inset 1px 1px 2px #555, 0 1px 1px rgba(255,255,255,0.2);
        }
        .guild-board::before { left: 10px; }
        .guild-board::after { right: 10px; }

        .greeting {
            color: #ffd700; font-size: 1.2rem; margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); letter-spacing: 1px;
        }

        .score-container {
            color: #fff8e7; font-size: 3.2rem; font-weight: bold;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.9); margin-bottom: 15px;
        }

        /* --- ПОЛОСКА ЭНЕРГИИ --- */
        .energy-wrapper {
            width: 100%; background-color: #1a0f07; border: 2px solid #000;
            border-radius: 10px; height: 14px; overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }

        .energy-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #50b487, #1f4a37); 
            transition: width 0.3s ease-out;
        }

        .energy-text {
            color: #a5d6a7; font-size: 0.85rem; margin-top: 8px;
            font-family: Arial, sans-serif; text-shadow: 1px 1px 2px #000;
        }

        /* --- КАРТИНКА РУДЫ --- */
        .ore-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .crystal-img {
            width: 280px; /* Размер картинки */
            height: auto;
            /* Свечение и тень создаются ПРЯМО ПО КОНТУРУ картинки */
            filter: drop-shadow(0 25px 15px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 30px rgba(100, 255, 150, 0.4));
            transition: transform 0.1s ease, filter 0.1s ease;
            pointer-events: none; /* Чтобы клик обрабатывался корректно */
        }

        /* Анимация нажатия */
        .ore-wrapper:active .crystal-img {
            transform: scale(0.95) translateY(5px);
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 45px rgba(100, 255, 150, 0.8));
        }

        /* Летающие циферки */
        .floating-text {
            position: absolute;
            color: #a5d6a7;
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px #50b487, 1px 1px 2px #000;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="guild-board">
        <div class="greeting" id="greeting">Авантюрист</div>
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper">
            <div class="energy-bar" id="energy-bar"></div>
        </div>
        <div class="energy-text" id="energy-text">Загрузка...</div>
    </div>

    <div class="ore-wrapper" id="ore">
        <img src="1000019091-removebg-preview.png" alt="Кристалл" class="crystal-img">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const scoreElement = document.getElementById('score');
        const oreElement = document.getElementById('ore');
        const greetingElement = document.getElementById('greeting');
        const energyBar = document.getElementById('energy-bar');
        const energyTextElement = document.getElementById('energy-text');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingElement.innerText = tg.initDataUnsafe.user.first_name;
        }

        const maxEnergy = 500;
        const regenAmount = 100;
        const regenIntervalMs = 5 * 60 * 1000;

        let score = parseInt(localStorage.getItem('mithrilScore')) || 0;
        let energy = parseInt(localStorage.getItem('mithrilEnergy'));
        if (isNaN(energy)) energy = maxEnergy;

        let lastTickTime = parseInt(localStorage.getItem('lastTickTime')) || Date.now();

        function checkEnergyRegen() {
            let now = Date.now();
            if (energy < maxEnergy) {
                let timePassed = now - lastTickTime;
                
                if (timePassed >= regenIntervalMs) {
                    let ticks = Math.floor(timePassed / regenIntervalMs);
                    energy += ticks * regenAmount;
                    if (energy > maxEnergy) energy = maxEnergy;
                    
                    lastTickTime += ticks * regenIntervalMs; 
                    saveData();
                }
            } else {
                lastTickTime = now;
            }
        }

        function updateUI() {
            scoreElement.innerText = score;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;

            if (energy >= maxEnergy) {
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (Максимум)`;
            } else {
                let now = Date.now();
                let timeLeftMs = regenIntervalMs - (now - lastTickTime);
                if (timeLeftMs < 0) timeLeftMs = 0;
                
                let minutes = Math.floor(timeLeftMs / 60000);
                let seconds = Math.floor((timeLeftMs % 60000) / 1000);
                let timeString = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                energyTextElement.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${timeString})`;
            }
        }

        function saveData() {
            localStorage.setItem('mithrilScore', score);
            localStorage.setItem('mithrilEnergy', energy);
            localStorage.setItem('lastTickTime', lastTickTime);
        }

        checkEnergyRegen();
        updateUI();
        
        setInterval(() => {
            checkEnergyRegen();
            updateUI();
        }, 1000);

        oreElement.addEventListener('pointerdown', (e) => {
            if (energy >= 1) {
                if (energy === maxEnergy) {
                    lastTickTime = Date.now();
                }

                energy--;
                score++;
                
                saveData();
                updateUI();

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                const plusOne = document.createElement('div');
                plusOne.classList.add('floating-text');
                plusOne.innerText = '+1';
                
                plusOne.style.left = `${e.clientX - 15}px`;
                plusOne.style.top = `${e.clientY - 40}px`;
                
                document.body.appendChild(plusOne);

                setTimeout(() => {
                    plusOne.remove();
                }, 1000);
            } else {
                energyTextElement.style.color = '#ff5252';
                setTimeout(() => energyTextElement.style.color = '#a5d6a7', 300);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });
    </script>
</body>
</html>
