<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мифриловый Кликер</title>
    
    <script async src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-user-drag: none; box-sizing: border-box; outline: none; }
        
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-family: 'Georgia', serif; overflow: hidden; 
            /* Стартовый фон задается здесь, но теперь будет меняться скриптом */
            background-image: url('IMG_20260311_002626.png');
            background-size: cover; background-position: center; background-color: #1a2f24;
            transition: background-image 0.5s ease-in-out; /* Плавная смена фона */
        }

        .leaf {
            position: absolute; top: -10%; 
            border-radius: 0 50% 0 50%; opacity: 0.85; pointer-events: none; z-index: 1; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.85; }
            80% { opacity: 0.85; }
            100% { transform: translate(var(--end-x), 110vh) rotate(var(--rotation)); opacity: 0; }
        }

        .guild-board { background-image: url('1000019094-removebg-preview.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; width: 390px; padding-top: 90px; padding-bottom: 80px; padding-left: 40px; padding-right: 40px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8)); margin-bottom: 20px; position: relative; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .level-container { color: #ffd700; font-size: 1.5rem; font-weight: bold; text-shadow: 1px 1px 2px #000; margin-bottom: 5px; z-index: 2; transition: transform 0.2s; }
        .score-container { color: #1a0b02; font-size: 3.4rem; font-weight: bold; text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.25), -1px -1px 2px rgba(0, 0, 0, 0.9); margin-bottom: 12px; z-index: 2; }
        
        .energy-wrapper { width: 65%; background-color: rgba(10, 5, 0, 0.5); border: 1px solid rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.15); border-radius: 8px; height: 12px; overflow: hidden; box-shadow: inset 0 3px 5px rgba(0,0,0,0.9); z-index: 2; }
        .energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #2e7d32, #50b487, #81c784); box-shadow: inset 0 0 5px rgba(0,0,0,0.5); transition: width 0.3s ease-out; }
        .energy-text { color: #ffeba1; font-size: 0.85rem; margin-top: 5px; margin-bottom: 10px; font-weight: bold; white-space: nowrap; text-shadow: 1px 1px 3px #000, -1px -1px 1px rgba(0,0,0,0.8); z-index: 2; }
        
        .xp-wrapper { width: 65%; background-color: rgba(10, 5, 0, 0.5); border: 1px solid rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.15); border-radius: 8px; height: 12px; overflow: hidden; box-shadow: inset 0 3px 5px rgba(0,0,0,0.9); z-index: 2; }
        .xp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #1976d2, #42a5f5, #90caf9); box-shadow: inset 0 0 5px rgba(0,0,0,0.5); transition: width 0.2s ease-out; }
        .xp-text { color: #90caf9; font-size: 0.85rem; margin-top: 5px; font-weight: bold; white-space: nowrap; text-shadow: 1px 1px 3px #000, -1px -1px 1px rgba(0,0,0,0.8); z-index: 2; }
        
        .ore-wrapper { position: relative; display: flex; justify-content: center; align-items: center; margin-top: 10px; -webkit-tap-highlight-color: transparent; z-index: 10; }
        .crystal-img { width: 280px; height: auto; filter: drop-shadow(0 25px 15px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 30px rgba(100, 255, 150, 0.4)); transition: transform 0.1s ease, filter 0.1s ease; cursor: pointer; }
        .crystal-img:active { transform: scale(0.95) translateY(5px); filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 45px rgba(100, 255, 150, 0.8)); }
        
        .floating-text { position: absolute; color: #a5d6a7; font-size: 1.8rem; font-weight: bold; pointer-events: none; animation: floatUp 1s ease-out forwards; text-shadow: 0 0 10px #50b487, 1px 1px 2px #000; z-index: 15; white-space: nowrap; }
        
        .floating-text.crit { color: #ff5252; font-size: 2.2rem; text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000; animation: floatUpCrit 1.2s ease-out forwards; }
        .floating-text.loot { color: #e040fb; font-size: 1.5rem; text-shadow: 0 0 15px #e040fb, 1px 1px 2px #000; animation: floatUpLoot 2s ease-out forwards; }
        
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-70px) scale(1.5); opacity: 0; } }
        @keyframes floatUpCrit { 0% { transform: translateY(0) scale(1.2); opacity: 1; } 20% { transform: translateY(-20px) scale(1.4); } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
        @keyframes floatUpLoot { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
        
        .pickaxe-effect { position: absolute; width: 100px; height: auto; pointer-events: none; z-index: 50; transform-origin: bottom right; animation: mineStrike ease-in-out forwards; filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.7)); }
        @keyframes mineStrike { 0% { transform: rotate(-30deg) scale(1.1); opacity: 0; } 30% { transform: rotate(-70deg) scale(1.4); opacity: 1; } 60% { transform: rotate(15deg) scale(1.1); opacity: 1; } 100% { transform: rotate(35deg) scale(0.9); opacity: 0; } }
        
        .spark { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle, #ffffff 10%, #ffd700 40%, transparent 80%); border-radius: 50%; pointer-events: none; z-index: 45; animation: sparkFly 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; will-change: transform, opacity; }
        @keyframes sparkFly { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 50% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <div class="guild-board">
        <div class="level-container" id="level-container">Уровень <span id="level-text">1</span></div>
        <div class="score-container" id="score">0</div>
        
        <div class="energy-wrapper"><div class="energy-bar" id="energy-bar"></div></div>
        <div class="energy-text" id="energy-text">Загрузка...</div>

        <div class="xp-wrapper"><div class="xp-bar" id="xp-bar"></div></div>
        <div class="xp-text" id="xp-text">Опыт: 0 / 150</div>
    </div>

    <div class="ore-wrapper">
        <img src="1000019091-removebg-preview.png" alt="Кристалл" class="crystal-img" id="ore-img" draggable="false">
    </div>

    <script>
        window.onerror = function(msg, url, lineNo) {
            var el = document.getElementById('energy-text');
            if(el) { el.innerText = "ОШИБКА: " + msg; el.style.color = "#ff5252"; }
            return false;
        };
    </script>

    <script>
        const textEl = document.getElementById('energy-text');

        try {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('dragstart', e => e.preventDefault());
            document.addEventListener('selectstart', e => e.preventDefault());

            let tg = null;
            try { if (window.Telegram && window.Telegram.WebApp) { tg = window.Telegram.WebApp; tg.expand(); } } catch(e) {}

            function createLeaf() {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                
                let randColor = Math.random();
                if (randColor < 0.6) {
                    leaf.style.background = 'linear-gradient(135deg, #f8bbd0, #e91e63)';
                } else if (randColor < 0.8) {
                    leaf.style.background = 'linear-gradient(135deg, #4caf50, #1b5e20)';
                } else {
                    leaf.style.background = 'linear-gradient(135deg, #81c784, #2e7d32)';
                }

                leaf.style.left = Math.random() * 100 + 'vw';
                let scale = 0.6 + Math.random() * 0.6;
                leaf.style.width = (15 * scale) + 'px';
                leaf.style.height = (15 * scale) + 'px';
                let endX = (Math.random() - 0.5) * 300; 
                let rotation = (Math.random() > 0.5 ? 1 : -1) * (180 + Math.random() * 360); 
                let duration = 6 + Math.random() * 6; 
                leaf.style.setProperty('--end-x', endX + 'px');
                leaf.style.setProperty('--rotation', rotation + 'deg');
                leaf.style.animationDuration = duration + 's';
                
                document.body.appendChild(leaf);
                setTimeout(() => { leaf.remove(); }, duration * 1000);
            }
            setInterval(createLeaf, 600);
            for(let i = 0; i < 5; i++) { setTimeout(createLeaf, i * 200); }

            function getSafeNumber(key, fallback) {
                try {
                    let val = localStorage.getItem(key);
                    if (val === null || val === undefined || val === 'NaN') return fallback;
                    let num = parseInt(val);
                    return isNaN(num) ? fallback : num;
                } catch(e) { return fallback; }
            }

            let score = getSafeNumber('mithrilScore', 0);
            let level = getSafeNumber('mithrilLevel', 1);
            let xp = getSafeNumber('mithrilXP', 0);
            let lastTickTime = getSafeNumber('lastTickTime', Date.now());

            if (level < 1 || score < 0 || xp < 0) {
                localStorage.clear();
                score = 0; level = 1; xp = 0; lastTickTime = Date.now();
            }
            
            const MAX_CLICK_POWER = 100000;
            const MAX_ENERGY_LIMIT = 3500;
            const MIN_REGEN_MS = 60000; 

            let clickPower = Math.min(1 + (level - 1), MAX_CLICK_POWER);
            let maxEnergy = Math.min(500 + (level - 1) * 10, MAX_ENERGY_LIMIT);
            let regenIntervalMs = Math.max(300000 - (level - 1) * 200, MIN_REGEN_MS);
            
            let energy = getSafeNumber('mithrilEnergy', maxEnergy);
            if (energy > maxEnergy || energy < 0) energy = maxEnergy;
            
            let xpNeeded = Math.floor(150 * Math.pow(1.4, level - 1)); 
            if (isNaN(xpNeeded) || xpNeeded < 150) xpNeeded = 150;

            const regenAmount = 100;
            let lastClickAnimTime = 0;

            // === СИСТЕМА ЭВОЛЮЦИИ РУДЫ ===
            function updateOreImage() {
                let oreImg = document.getElementById('ore-img');
                if (level >= 100) {
                    oreImg.src = 'Ruda100lvl.png'; 
                } else if (level >= 75) {
                    oreImg.src = 'Ruda75lvl.png'; 
                } else if (level >= 50) {
                    oreImg.src = 'Ruda50lvl.png'; 
                } else if (level >= 30) {
                    oreImg.src = 'Ruda30lvl.png'; 
                } else if (level >= 15) {
                    oreImg.src = 'Ruda15lvl.png'; 
                } else {
                    oreImg.src = '1000019091-removebg-preview.png'; 
                }
            }

            // === ОБНОВЛЕННАЯ СИСТЕМА СМЕНЫ ФОНА ===
            function updateBackgroundImage() {
                if (level >= 100) {
                    document.body.style.backgroundImage = "url('Fon100lvl.png')";
                } else if (level >= 75) {
                    document.body.style.backgroundImage = "url('Fon75lvl.png')";
                } else if (level >= 50) {
                    document.body.style.backgroundImage = "url('Fon50lvl.png')";
                } else if (level >= 30) {
                    document.body.style.backgroundImage = "url('Fon30lvl.png')";
                } else if (level >= 15) {
                    document.body.style.backgroundImage = "url('Fon15lvl.png')";
                } else {
                    document.body.style.backgroundImage = "url('IMG_20260311_002626.png')";
                }
            }

            // Вызываем обе функции при старте
            updateOreImage();
            updateBackgroundImage();

            function saveData() {
                try {
                    localStorage.setItem('mithrilScore', score);
                    localStorage.setItem('mithrilLevel', level);
                    localStorage.setItem('mithrilXP', xp);
                    localStorage.setItem('mithrilEnergy', energy);
                    localStorage.setItem('lastTickTime', lastTickTime);
                } catch(e) {}
            }

            function checkLevelUp() {
                let leveledUp = false;
                while (xp >= xpNeeded) {
                    xp -= xpNeeded; 
                    level++;
                    xpNeeded = Math.floor(150 * Math.pow(1.4, level - 1)); 
                    leveledUp = true;
                }

                if (leveledUp) {
                    clickPower = Math.min(1 + (level - 1), MAX_CLICK_POWER);
                    maxEnergy = Math.min(500 + (level - 1) * 10, MAX_ENERGY_LIMIT);
                    regenIntervalMs = Math.max(300000 - (level - 1) * 200, MIN_REGEN_MS);
                    
                    updateOreImage(); 
                    updateBackgroundImage(); // Проверяем фон при левелапе

                    let lvlContainer = document.getElementById('level-container');
                    lvlContainer.style.transform = "scale(1.3)";
                    lvlContainer.style.color = "#fff";
                    setTimeout(() => {
                        lvlContainer.style.transform = "scale(1)";
                        lvlContainer.style.color = "#ffd700";
                    }, 300);
                    
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }
            }

            function updateUI() {
                document.getElementById('score').innerText = score;
                document.getElementById('level-text').innerText = level;
                document.getElementById('energy-bar').style.width = Math.min(100, (energy / maxEnergy) * 100) + '%';

                textEl.style.color = "#ffeba1";
                if (energy >= maxEnergy) {
                    textEl.innerText = `${energy} / ${maxEnergy} ⚡ (Макс)`;
                } else {
                    let timeLeft = Math.max(0, regenIntervalMs - (Date.now() - lastTickTime));
                    let m = Math.floor(timeLeft / 60000);
                    let s = Math.floor((timeLeft % 60000) / 1000);
                    textEl.innerText = `${energy} / ${maxEnergy} ⚡ (+100 через ${m}:${s < 10 ? '0' : ''}${s})`;
                }

                document.getElementById('xp-bar').style.width = Math.min(100, (xp / xpNeeded) * 100) + '%';
                document.getElementById('xp-text').innerText = `Опыт: ${Math.floor(xp)} / ${xpNeeded}`;
            }

            function checkRegen() {
                let now = Date.now();
                if (energy < maxEnergy) {
                    let passed = now - lastTickTime;
                    if (passed >= regenIntervalMs) {
                        let ticks = Math.floor(passed / regenIntervalMs);
                        energy = Math.min(maxEnergy, energy + (ticks * regenAmount));
                        lastTickTime += ticks * regenIntervalMs; 
                        saveData();
                    }
                } else {
                    lastTickTime = now;
                }
                updateUI();
            }

            checkRegen();
            setInterval(checkRegen, 1000);

            document.getElementById('ore-img').addEventListener('pointerdown', function(e) {
                if (energy >= 1) {
                    if (energy === maxEnergy) lastTickTime = Date.now();
                    
                    energy--;

                    let isCrit = Math.random() < 0.02;
                    let isLoot = Math.random() < 0.005; 
                    
                    let damage = clickPower;
                    if (isCrit) damage *= 5;

                    score += damage;
                    xp += damage; 
                    
                    if (isLoot) {
                        energy = maxEnergy; 
                        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }

                    checkLevelUp();
                    saveData();
                    updateUI();
                    
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(isCrit ? 'heavy' : 'light');

                    let nowAnim = Date.now();
                    let timeSinceLastClick = nowAnim - (lastClickAnimTime || nowAnim - 1000);
                    lastClickAnimTime = nowAnim;
                    let animDuration = Math.max(0.15, Math.min(0.6, timeSinceLastClick / 1000));

                    const pickaxe = document.createElement('img');
                    pickaxe.src = '1000019118-removebg-preview.png?v=fixed2'; 
                    pickaxe.className = 'pickaxe-effect';
                    pickaxe.style.left = `${e.clientX - 60}px`;
                    pickaxe.style.top = `${e.clientY - 80}px`;
                    pickaxe.style.animationDuration = `${animDuration}s`;
                    document.body.appendChild(pickaxe);

                    const plusOne = document.createElement('div');
                    plusOne.className = 'floating-text' + (isCrit ? ' crit' : '');
                    plusOne.innerText = `+${damage}`;
                    plusOne.style.left = `${e.clientX - 20}px`;
                    plusOne.style.top = `${e.clientY - 40}px`;
                    document.body.appendChild(plusOne);

                    if (isLoot) {
                        const lootText = document.createElement('div');
                        lootText.className = 'floating-text loot';
                        lootText.innerText = `✨ МАГИЧЕСКАЯ ПЫЛЬЦА! ✨`;
                        lootText.style.left = `50%`;
                        lootText.style.transform = `translateX(-50%)`;
                        lootText.style.top = `${e.clientY - 80}px`;
                        document.body.appendChild(lootText);
                        setTimeout(() => lootText.remove(), 2000);
                    }

                    const sparkCount = isCrit ? 4 : 3;
                    for (let i = 0; i < sparkCount; i++) {
                        const spark = document.createElement('div');
                        spark.className = 'spark';
                        
                        if (isCrit) {
                            spark.style.background = 'radial-gradient(circle, #ffffff 10%, #ff5252 40%, transparent 80%)';
                        }
                        
                        spark.style.left = `${e.clientX + (Math.random() - 0.5) * 30}px`;
                        spark.style.top = `${e.clientY - 10 + (Math.random() - 0.5) * 30}px`;
                        spark.style.setProperty('--tx', `${(Math.random() - 0.5) * 160}px`);
                        spark.style.setProperty('--ty', `${(Math.random() - 0.5) * 160}px`);
